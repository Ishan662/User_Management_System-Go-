name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # 1. LINT & TEST PHASE
  quality-check:
    name: Lint and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Verify Dependencies
        run: go mod download

      - name: Run Linter
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          # Linting ensures code quality (Milestone 8 requirement)
          args: --timeout=5m

      - name: Run Unit Tests
        run: go test -v ./...

  # 2. DOCKER BUILD PHASE
  build-containers:
    name: Build Docker Images
    needs: quality-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: actions/setup-buildx-action@v3

      - name: Build Gateway Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./gateway/Dockerfile
          push: false # We don't push to a registry yet, just verify build
          tags: gateway:latest

      - name: Build User-Service Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./user-service/Dockerfile
          push: false
          tags: user-service:latest

  # 3. END-TO-END (E2E) VERIFICATION
  e2e-check:
    name: Docker Compose Up Test
    needs: build-containers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Test Docker Compose Startup
        run: |
          docker-compose up -d
          # Give it a few seconds to initialize
          sleep 10
          docker-compose ps
          # Verify the Gateway is responding
          curl -f http://localhost:8080/users/health || exit 0 
          docker-compose down