services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: user_db
    ports:
      - "5432:5432"

  nats:
    image: nats:latest
    ports:
      - "4222:4222"
      - "8222:8222" 

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    environment:
      - DB_URL=postgres://user:password@postgres:5432/user_db?sslmode=disable
      - NATS_URL=nats://nats:4222
    depends_on:
      - postgres
      - nats

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    environment:
      - NATS_URL=nats://nats:4222
    ports:
      - "8080:8080"
    depends_on:
      - nats