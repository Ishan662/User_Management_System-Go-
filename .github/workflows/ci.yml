name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality-check:
    name: Lint and Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # This tells GitHub to run the steps below twice: once for each folder
        service: [gateway, user-service]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Verify Dependencies
        # This runs inside the specific service folder
        run: cd user-mgmt-system/${{ matrix.service }} && go mod download

      - name: Run Linter
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          # CRITICAL: This tells the linter to start looking inside the subfolder
          working-directory: user-mgmt-system/${{ matrix.service }}
          args: --timeout=5m

      - name: Run Unit Tests
        run: cd user-mgmt-system/${{ matrix.service }} && go test -v ./...

  build-containers:
    name: Build Docker Images
    needs: quality-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: actions/build-push-action@v5 # Using standard buildx

      - name: Build Gateway Image
        run: |
          docker build -t gateway:latest -f user-mgmt-system/gateway/Dockerfile .

      - name: Build User-Service Image
        run: |
          docker build -t user-service:latest -f user-mgmt-system/user-service/Dockerfile .