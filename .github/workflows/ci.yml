name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality-check:
    name: Lint and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      # Notice the extra "user-mgmt-system/" in the paths below:
      - name: Verify Gateway Dependencies
        run: cd user-mgmt-system/gateway && go mod download

      - name: Verify User-Service Dependencies
        run: cd user-mgmt-system/user-service && go mod download

      - name: Run Linter
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          args: --timeout=5m ./user-mgmt-system/gateway/... ./user-mgmt-system/user-service/...

      - name: Run Unit Tests
        run: go test -v ./user-mgmt-system/gateway/... ./user-mgmt-system/user-service/...

  build-containers:
    name: Build Docker Images
    needs: quality-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: actions/build-push-action@v5 # Using standard buildx

      - name: Build Gateway Image
        run: |
          docker build -t gateway:latest -f user-mgmt-system/gateway/Dockerfile .

      - name: Build User-Service Image
        run: |
          docker build -t user-service:latest -f user-mgmt-system/user-service/Dockerfile .